<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MacroTracker">
    <link rel="apple-touch-icon" href="icon-192.png">

    <title>MacroTracker</title>
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #121212;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #compose-target {
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Use relative paths for GitHub Pages subfolder support -->
    <script type="application/javascript" src="composeApp.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Register service worker using relative path
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service worker registered'))
                    .catch(err => console.log('Service worker registration failed', err));
            });
        }
    </script>
</head>
<body>
    <canvas id="compose-target"></canvas>
</body>
</html>
